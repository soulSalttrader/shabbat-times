material = "1.13.0"
material3 = "1.5.0-alpha08"
reorderable = "3.0.0"
retrofit = "3.0.0"
loggingInterceptor = "5.3.2"
okhttp = "5.3.2"
composeNavigation = "2.9.6"
serialization = "1.9.0"
